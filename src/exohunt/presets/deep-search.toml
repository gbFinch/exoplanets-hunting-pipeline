schema_version = 1
preset = "deep-search"

[io]
refresh_cache = false

[ingest]
authors = ["SPOC"]

[preprocess]
enabled = true
mode = "per-sector"
outlier_sigma = 4.0
flatten_window_length = 801
flatten = true

[plot]
enabled = false
mode = "stitched"
interactive_html = true
interactive_max_points = 300000

[bls]
enabled = true
mode = "stitched"
period_min_days = 0.3
period_max_days = 40.0
duration_min_hours = 0.5
duration_max_hours = 12.0
n_periods = 8000
n_durations = 20
top_n = 10

schema_version = 1
preset = "quicklook"

[io]
refresh_cache = false

[ingest]
authors = ["SPOC"]

[preprocess]
enabled = true
mode = "per-sector"
outlier_sigma = 6.0
flatten_window_length = 201
flatten = true

[plot]
enabled = true
mode = "stitched"
interactive_html = false
interactive_max_points = 120000

[bls]
enabled = true
mode = "stitched"
period_min_days = 0.8
period_max_days = 12.0
duration_min_hours = 0.75
duration_max_hours = 8.0
n_periods = 1200
n_durations = 10
top_n = 3
